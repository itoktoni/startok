<!DOCTYPE html>
<html lang="id" data-theme="shadcn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders</title>
  <link href="dist/output.css" rel="stylesheet">
</head>
<body class="bg-base-200 min-h-screen text-sm pb-16">

<!-- Header -->
<header class="bg-base-100 border-b border-base-300 px-3 py-2.5 flex items-center justify-between sticky top-0 z-40">
  <div class="flex items-center gap-2"><a href="index.html" class="btn btn-xs btn-soft btn-circle"><span class="icon-[tabler--arrow-left] size-4"></span></a><h1 class="text-sm font-bold">Orders</h1></div>
  <button class="btn btn-xs btn-primary gap-1"><span class="icon-[tabler--plus] size-3.5"></span>New</button>
</header>

<div class="p-2 lg:p-3 space-y-3">
  <!-- Filters -->
  <div class="card bg-base-100 shadow-sm"><div class="card-body p-3">
    <div class="flex flex-wrap items-center gap-2">
      <input type="text" id="searchInput" class="input input-sm flex-1 min-w-[150px]" placeholder="Search customer..." oninput="filterTable()">
      <select id="filterShip" class="select select-sm" onchange="filterTable()"><option value="">All Shipping</option><option>COD Berbah</option><option>COD Piyungan</option><option>Dikirim</option></select>
      <select id="filterPay" class="select select-sm" onchange="filterTable()"><option value="">All Payment</option><option>Cash</option><option>QRIS</option><option>Card</option></select>
      <button class="btn btn-sm btn-outline gap-1" onclick="document.getElementById('advFilter').classList.toggle('hidden')"><span class="icon-[tabler--filter] size-3.5"></span>Filter</button>
    </div>
  </div></div>

  <!-- Table -->
  <div class="card bg-base-100 shadow-sm"><div class="card-body p-0">
    <!-- Desktop Table -->
    <div class="hidden lg:block overflow-x-auto">
      <table class="table table-xs w-full">
        <thead><tr>
          <th><input type="checkbox" class="checkbox checkbox-xs" onchange="toggleAll(this)"></th>
          <th>Customer</th><th>Tanggal</th><th>Pengiriman</th><th>Discount</th><th>Tax</th><th>Payment</th><th class="text-right">Total</th><th>Actions</th>
        </tr></thead>
        <tbody id="tBody"></tbody>
      </table>
    </div>
    <!-- Mobile Cards -->
    <div class="lg:hidden divide-y divide-base-200" id="mBody"></div>
    <!-- Footer -->
    <div class="flex items-center justify-between p-3 border-t border-base-200">
      <button class="btn btn-xs btn-soft btn-error gap-1" onclick="deleteSelected()"><span class="icon-[tabler--trash] size-3.5"></span>Delete Selected</button>
      <span class="text-xs text-base-content/50"><span id="rowCount">0</span> orders</span>
    </div>
  </div></div>
</div>

<!-- Advanced Filter Drawer -->
<div id="advFilter" class="hidden fixed inset-0 z-50">
  <div class="absolute inset-0 bg-black/40" onclick="document.getElementById('advFilter').classList.add('hidden')"></div>
  <div class="absolute right-0 top-0 h-full w-80 max-w-[85vw] bg-base-100 shadow-xl p-4 space-y-3 overflow-y-auto">
    <div class="flex justify-between items-center"><h3 class="text-sm font-bold">Advanced Filter</h3><button class="btn btn-xs btn-soft btn-circle" onclick="document.getElementById('advFilter').classList.add('hidden')"><span class="icon-[tabler--x] size-4"></span></button></div>
    <div><label class="label-text text-xs">Date Range</label><div class="grid grid-cols-2 gap-2"><input type="date" id="afFrom" class="input input-sm"><input type="date" id="afTo" class="input input-sm"></div></div>
    <div><label class="label-text text-xs">Min Total</label><input type="number" id="afMin" class="input input-sm w-full" placeholder="0"></div>
    <div><label class="label-text text-xs">Max Total</label><input type="number" id="afMax" class="input input-sm w-full" placeholder="999999999"></div>
    <div><label class="label-text text-xs">Discount</label><select id="afDisc" class="select select-sm w-full"><option value="">Any</option><option value="yes">Has Discount</option><option value="no">No Discount</option></select></div>
    <div><label class="label-text text-xs">Tax</label><select id="afTax" class="select select-sm w-full"><option value="">Any</option><option value="11">11%</option><option value="12">12%</option></select></div>
    <button class="btn btn-sm btn-primary btn-block" onclick="filterTable();document.getElementById('advFilter').classList.add('hidden')">Apply Filter</button>
    <button class="btn btn-sm btn-soft btn-block" onclick="resetFilter()">Reset</button>
  </div>
</div>

<!-- Footer Nav -->
<footer class="fixed bottom-0 left-0 right-0 bg-base-100 border-t border-base-300 z-40">
  <div class="flex justify-around items-center py-1.5">
    <a href="invoice.html" class="flex flex-col items-center gap-0.5 text-base-content/50"><span class="icon-[tabler--file-invoice] size-5"></span><span class="text-[9px]">Invoice</span></a>
    <a href="pos.html" class="flex flex-col items-center gap-0.5 text-base-content/50"><span class="icon-[tabler--shopping-cart] size-5"></span><span class="text-[9px]">POS</span></a>
    <a href="index.html" class="flex flex-col items-center gap-0.5 -mt-4"><span class="btn btn-circle btn-sm btn-primary shadow-md"><span class="icon-[tabler--home] size-5"></span></span><span class="text-[9px] mt-0.5">Home</span></a>
    <a href="table.html" class="flex flex-col items-center gap-0.5 text-primary"><span class="icon-[tabler--list-details] size-5"></span><span class="text-[9px] font-medium">Orders</span></a>
    <a href="#" class="flex flex-col items-center gap-0.5 text-base-content/50"><span class="icon-[tabler--user] size-5"></span><span class="text-[9px]">Profile</span></a>
  </div>
</footer>

<script>
const orders=[
  {id:1,cust:'PT. Maju Jaya',date:'2026-05-17',ship:'COD Berbah',disc:10,tax:11,pay:'Cash',total:15500000},
  {id:2,cust:'CV. Berkah Sentosa',date:'2026-05-16',ship:'Dikirim',disc:0,tax:11,pay:'QRIS',total:4500000},
  {id:3,cust:'PT. Sinar Abadi',date:'2026-05-15',ship:'COD Piyungan',disc:5,tax:12,pay:'Card',total:8200000},
  {id:4,cust:'UD. Makmur Sejahtera',date:'2026-05-14',ship:'Dikirim',disc:15,tax:11,pay:'Cash',total:2350000},
  {id:5,cust:'PT. Global Teknik',date:'2026-05-13',ship:'COD Berbah',disc:0,tax:11,pay:'QRIS',total:12800000},
  {id:6,cust:'Toko Jaya Abadi',date:'2026-05-12',ship:'Dikirim',disc:20,tax:12,pay:'Card',total:6750000},
  {id:7,cust:'CV. Nusantara',date:'2026-05-11',ship:'COD Piyungan',disc:0,tax:11,pay:'Cash',total:950000},
  {id:8,cust:'PT. Karya Mandiri',date:'2026-05-10',ship:'COD Berbah',disc:10,tax:11,pay:'QRIS',total:3200000},
];
let selected=new Set();
const fmt=n=>'Rp '+n.toLocaleString('id-ID');
const shipBadge=s=>s==='Dikirim'?'badge-info':s.includes('Berbah')?'badge-success':'badge-warning';
const payBadge=p=>p==='Cash'?'badge-success':p==='QRIS'?'badge-primary':'badge-secondary';

function renderTable(data){
  document.getElementById('rowCount').textContent=data.length;
  // Desktop
  document.getElementById('tBody').innerHTML=data.map(o=>`<tr class="${selected.has(o.id)?'bg-primary/5':''}">
    <td><input type="checkbox" class="checkbox checkbox-xs" ${selected.has(o.id)?'checked':''} onchange="toggleRow(${o.id},this)"></td>
    <td class="font-medium">${o.cust}</td>
    <td class="text-base-content/60">${o.date}</td>
    <td><span class="badge badge-xs ${shipBadge(o.ship)}">${o.ship}</span></td>
    <td>${o.disc?o.disc+'%':'-'}</td>
    <td>${o.tax}%</td>
    <td><span class="badge badge-xs ${payBadge(o.pay)}">${o.pay}</span></td>
    <td class="text-right font-mono font-medium">${fmt(o.total)}</td>
    <td><div class="flex gap-0.5">
      <button class="btn btn-xs btn-soft btn-circle" title="Edit"><span class="icon-[tabler--edit] size-3"></span></button>
      <button class="btn btn-xs btn-soft btn-circle" title="Print"><span class="icon-[tabler--printer] size-3"></span></button>
      <button class="btn btn-xs btn-soft btn-warning btn-circle" title="Prepare"><span class="icon-[tabler--package] size-3"></span></button>
      <button class="btn btn-xs btn-soft btn-error btn-circle" title="Delete" onclick="deleteRow(${o.id})"><span class="icon-[tabler--trash] size-3"></span></button>
    </div></td>
  </tr>`).join('');
  // Mobile
  document.getElementById('mBody').innerHTML=data.map(o=>`<div class="p-3 ${selected.has(o.id)?'bg-primary/5':''}">
    <div class="flex items-start gap-2">
      <input type="checkbox" class="checkbox checkbox-xs mt-0.5" ${selected.has(o.id)?'checked':''} onchange="toggleRow(${o.id},this)">
      <div class="flex-1 min-w-0">
        <div class="flex justify-between items-start"><p class="text-xs font-bold truncate">${o.cust}</p><span class="text-xs font-mono font-bold shrink-0">${fmt(o.total)}</span></div>
        <div class="flex flex-wrap gap-1 mt-1">
          <span class="badge badge-xs ${shipBadge(o.ship)}">${o.ship}</span>
          <span class="badge badge-xs ${payBadge(o.pay)}">${o.pay}</span>
          ${o.disc?'<span class="badge badge-xs badge-soft">-'+o.disc+'%</span>':''}
          <span class="badge badge-xs badge-outline">Tax ${o.tax}%</span>
        </div>
        <p class="text-[10px] text-base-content/50 mt-1">${o.date}</p>
      </div>
    </div>
    <div class="flex gap-1 mt-2 pl-6">
      <button class="btn btn-xs btn-soft flex-1 gap-0.5"><span class="icon-[tabler--edit] size-3"></span>Edit</button>
      <button class="btn btn-xs btn-soft flex-1 gap-0.5"><span class="icon-[tabler--printer] size-3"></span>Print</button>
      <button class="btn btn-xs btn-soft btn-warning flex-1 gap-0.5"><span class="icon-[tabler--package] size-3"></span>Prep</button>
      <button class="btn btn-xs btn-soft btn-error flex-1 gap-0.5" onclick="deleteRow(${o.id})"><span class="icon-[tabler--trash] size-3"></span>Del</button>
    </div>
  </div>`).join('');
}

function filterTable(){
  let data=[...orders];
  const q=document.getElementById('searchInput').value.toLowerCase();
  const ship=document.getElementById('filterShip').value;
  const pay=document.getElementById('filterPay').value;
  const afFrom=document.getElementById('afFrom').value;
  const afTo=document.getElementById('afTo').value;
  const afMin=+(document.getElementById('afMin').value)||0;
  const afMax=+(document.getElementById('afMax').value)||Infinity;
  const afDisc=document.getElementById('afDisc').value;
  const afTax=document.getElementById('afTax').value;
  if(q)data=data.filter(o=>o.cust.toLowerCase().includes(q));
  if(ship)data=data.filter(o=>o.ship===ship);
  if(pay)data=data.filter(o=>o.pay===pay);
  if(afFrom)data=data.filter(o=>o.date>=afFrom);
  if(afTo)data=data.filter(o=>o.date<=afTo);
  data=data.filter(o=>o.total>=afMin&&o.total<=afMax);
  if(afDisc==='yes')data=data.filter(o=>o.disc>0);
  if(afDisc==='no')data=data.filter(o=>o.disc===0);
  if(afTax)data=data.filter(o=>o.tax===+afTax);
  renderTable(data);
}
function resetFilter(){document.getElementById('afFrom').value='';document.getElementById('afTo').value='';document.getElementById('afMin').value='';document.getElementById('afMax').value='';document.getElementById('afDisc').value='';document.getElementById('afTax').value='';filterTable();}
function toggleAll(el){if(el.checked)orders.forEach(o=>selected.add(o.id));else selected.clear();filterTable();}
function toggleRow(id,el){if(el.checked)selected.add(id);else selected.delete(id);filterTable();}
function deleteRow(id){if(!confirm('Delete order #'+id+'?'))return;const i=orders.findIndex(o=>o.id===id);if(i>-1)orders.splice(i,1);selected.delete(id);filterTable();}
function deleteSelected(){if(!selected.size)return alert('No selection');if(!confirm('Delete '+selected.size+' orders?'))return;selected.forEach(id=>{const i=orders.findIndex(o=>o.id===id);if(i>-1)orders.splice(i,1);});selected.clear();filterTable();}
filterTable();
</script>
</body>
</html>

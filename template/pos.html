<!DOCTYPE html>
<html lang="id" data-theme="shadcn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS</title>
  <link href="dist/output.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>.pc:active{transform:scale(.96);transition:transform .1s}</style>
</head>
<body class="bg-base-200 h-screen flex flex-col overflow-hidden text-sm">
<!-- Nav -->
<nav class="bg-base-100 border-b border-base-300 px-3 py-1.5 flex items-center justify-between shrink-0">
  <a href="form.html" class="btn btn-xs btn-soft"><span class="icon-[tabler--arrow-left] size-3.5"></span></a>
  <strong class="text-sm">POS</strong>
  <span class="text-xs text-base-content/60" id="clk"></span>
</nav>

<!-- Mobile tabs -->
<div class="lg:hidden flex border-b border-base-300 bg-base-100 shrink-0">
  <button id="tabProd" class="flex-1 py-2 text-xs font-bold border-b-2 border-primary text-primary" onclick="switchTab('prod')">Products</button>
  <button id="tabOrder" class="flex-1 py-2 text-xs font-medium text-base-content/60" onclick="switchTab('order')">Order <span id="ccM" class="badge badge-xs badge-primary"></span></button>
</div>

<div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
  <!-- Products -->
  <div id="panelProd" class="flex-1 flex flex-col p-2 pb-14 lg:pb-2 min-h-0">
    <!-- Categories row + view toggle fixed right -->
    <div class="flex items-center gap-1.5 mb-1.5 shrink-0">
      <div class="flex-1 flex gap-1 overflow-x-scroll" style="-webkit-overflow-scrolling:touch">
        <button class="cat btn btn-xs btn-primary shrink-0" data-c="All">All</button>
        <button class="cat btn btn-xs btn-outline shrink-0" data-c="Makanan">Makanan</button>
        <button class="cat btn btn-xs btn-outline shrink-0" data-c="Minuman">Minuman</button>
        <button class="cat btn btn-xs btn-outline shrink-0" data-c="Snack">Snack</button>
        <button class="cat btn btn-xs btn-outline shrink-0" data-c="Dessert">Dessert</button>
        <button class="cat btn btn-xs btn-outline shrink-0" data-c="Dessert">Dessert</button>
        <button class="cat btn btn-xs btn-outline shrink-0" data-c="Dessert">Dessert</button>
        <button class="cat btn btn-xs btn-outline shrink-0" data-c="Dessert">Dessert</button>
        <button class="cat btn btn-xs btn-outline shrink-0" data-c="Dessert">Dessert</button>
        <button class="cat btn btn-xs btn-outline shrink-0" data-c="Dessert">Dessert</button>
      </div>
      <button id="gB" class="btn btn-xs btn-primary shrink-0" onclick="view='grid';render();this.className='btn btn-xs btn-primary shrink-0';document.getElementById('lB').className='btn btn-xs btn-outline shrink-0'"><span class="icon-[tabler--layout-grid] size-3.5"></span></button>
      <button id="lB" class="btn btn-xs btn-outline shrink-0" onclick="view='list';render();this.className='btn btn-xs btn-primary shrink-0';document.getElementById('gB').className='btn btn-xs btn-outline shrink-0'"><span class="icon-[tabler--list] size-3.5"></span></button>
    </div>
    <!-- Search below -->
    <input type="text" id="src" class="input input-sm w-full mb-2 shrink-0" placeholder="Cari produk..." oninput="render()">
    <!-- Grid -->
    <div id="prods" class="flex-1 overflow-y-scroll min-h-0" style="-webkit-overflow-scrolling:touch"></div>
  </div>

  <!-- Note Modal -->
  <div id="noteModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/40" onclick="closeNote()"></div>
    <div class="absolute bottom-0 left-0 right-0 lg:bottom-auto lg:top-1/2 lg:left-1/2 lg:-translate-x-1/2 lg:-translate-y-1/2 lg:w-80 bg-base-100 rounded-t-2xl lg:rounded-xl p-4 space-y-3">
      <div class="w-10 h-1 bg-base-300 rounded-full mx-auto lg:hidden"></div>
      <h4 class="text-sm font-bold" id="noteTitle">Catatan</h4>
      <div><label class="label-text text-xs">Varian</label><select id="noteVariant" class="select select-sm w-full" onchange="updateNotePrice()"><option value="0">Regular (+Rp 0)</option><option value="5000">Large (+Rp 5.000)</option><option value="10000">Extra (+Rp 10.000)</option></select></div>
      <div><label class="label-text text-xs">Catatan</label><input type="text" id="noteInput" class="input input-sm w-full" placeholder="Tanpa es, pedas, dll..."></div>
      <div class="flex justify-between items-center text-xs"><span class="text-base-content/60">Harga + varian</span><span id="noteTotal" class="font-bold text-primary"></span></div>
      <button class="btn btn-sm btn-primary btn-block" onclick="submitNote()">Tambahkan</button>
    </div>
  </div>

  <!-- Order -->
  <div id="panelOrder" class="hidden lg:flex lg:w-72 xl:w-80 bg-base-100 border-t lg:border-t-0 lg:border-l border-base-300 flex-col h-full">
    <div class="flex items-center justify-between px-2 py-1.5 border-b border-base-300 shrink-0">
      <span class="font-bold text-xs">Order <span id="cc" class="text-base-content/60"></span></span>
      <button class="btn btn-xs btn-soft btn-error" onclick="clearCart()">Clear</button>
    </div>
    <div id="cart" class="flex-1 overflow-y-scroll p-2 space-y-1" style="-webkit-overflow-scrolling:touch"><p class="text-center text-base-content/40 text-xs py-4">Empty</p></div>
    <div class="border-t border-base-300 p-2 space-y-1.5 shrink-0">
      <!-- Shipping -->
      <div class="text-xs mb-2"><span class="text-base-content/60">Pengiriman</span>
        <div class="flex flex-col gap-1 mt-1">
          <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="ship" class="radio radio-xs radio-primary" value="0" checked onchange="setShip(0)"><span class="text-xs">COD Berbah <span class="text-base-content/40">(Gratis)</span></span></label>
          <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="ship" class="radio radio-xs radio-primary" value="0" onchange="setShip(0)"><span class="text-xs">COD Piyungan <span class="text-base-content/40">(Gratis)</span></span></label>
          <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="ship" class="radio radio-xs radio-primary" value="delivery" onchange="openMap()"><span class="text-xs">Dikirim <span id="shipCost" class="text-primary font-medium"></span></span></label>
          <div id="shipDetail" class="hidden pl-5 mt-1">
            <div class="join w-full"><input type="text" id="shipAddr" class="input input-xs join-item flex-1" placeholder="Catatan alamat..."><button class="btn btn-xs btn-soft join-item gap-0.5" onclick="openMap()"><span class="icon-[tabler--map-pin] size-3"></span>Ubah</button></div>
          </div>
        </div>
      </div>
      <div class="border-b border-base-300 -mx-2 my-1"></div>
      <div class="flex justify-between items-center text-xs"><span class="text-base-content/60">Voucher</span><div class="join"><input type="text" id="voucherCode" class="input input-xs join-item w-20" placeholder="Kode..."><button class="btn btn-xs btn-primary join-item" onclick="applyVoucher()">Apply</button></div></div>
      <div id="voucherInfo" class="hidden flex justify-between text-xs text-success"><span id="voucherLabel"></span><span id="voucherAmt"></span></div>
      <div class="flex justify-between text-xs"><span class="text-base-content/60">Subtotal</span><span id="sub">Rp 0</span></div>
      <div class="flex justify-between items-center text-xs"><span class="text-base-content/60">Disc</span><div class="join"><input type="number" id="dsc" value="0" class="input input-xs join-item w-12 text-right" oninput="calcT()"><button id="dTog" class="btn btn-xs join-item" onclick="dP=!dP;this.textContent=dP?'%':'Rp';calcT()">%</button></div></div>
      <div class="flex justify-between items-center text-xs"><span class="text-base-content/60">Tax</span><div class="join"><input type="number" id="tax" value="11" class="input input-xs join-item w-12 text-right" oninput="calcT()"><span class="btn btn-xs join-item no-animation">%</span></div></div>
      <div class="divider my-0"></div>
      <div class="flex justify-between font-bold text-base"><span>Total</span><span id="tot">Rp 0</span></div>
      <div class="flex gap-1">
        <button class="pay btn btn-xs btn-outline flex-1" data-m="cash">Cash</button>
        <button class="pay btn btn-xs btn-outline flex-1" data-m="qris">QRIS</button>
        <button class="pay btn btn-xs btn-outline flex-1" data-m="card">COD</button>
      </div>
      <div id="qr" class="hidden py-1 text-center"><img src="https://placehold.co/100x100/f8fafc/1e293b?text=QRIS" class="rounded mx-auto"></div>
      <button class="btn btn-sm btn-primary btn-block" onclick="checkout()">Bayar</button>
      <div class="flex gap-1"><button class="btn btn-xs btn-outline flex-1" onclick="window.print()"><span class="icon-[tabler--printer] size-3"></span></button><button class="btn btn-xs btn-outline flex-1" onclick="expPDF()"><span class="icon-[tabler--pdf] size-3"></span></button></div>
    </div>
  </div>
</div>

<!-- Map Modal -->
<div id="mapModal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/40" onclick="closeMap()"></div>
  <div class="absolute inset-4 lg:inset-12 bg-base-100 rounded-xl flex flex-col overflow-hidden">
    <div class="flex items-center justify-between px-3 py-2 border-b border-base-300 shrink-0">
      <h4 class="text-sm font-bold">Pilih Lokasi Pengiriman</h4>
      <button class="btn btn-xs btn-soft btn-circle" onclick="closeMap()"><span class="icon-[tabler--x] size-4"></span></button>
    </div>
    <div id="map" class="flex-1"></div>
    <div class="px-3 py-2 border-t border-base-300 shrink-0">
      <div class="flex items-center justify-between gap-3">
        <button class="btn btn-xs btn-soft gap-1" onclick="getMyLocation()"><span class="icon-[tabler--current-location] size-3.5"></span>Lokasi Saya</button>
        <div class="text-right">
          <p class="text-[10px] text-base-content/50">Jarak: <span id="mapDist">0</span> km × Rp 3.000/km</p>
          <p class="text-sm font-bold text-primary">Ongkir: <span id="mapCost">Rp 0</span></p>
        </div>
      </div>
      <button class="btn btn-sm btn-primary btn-block mt-2" onclick="confirmMap()">Konfirmasi Lokasi</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script>
const P=[{n:"Nasi Goreng",p:25000,c:"Makanan"},{n:"Mie Ayam",p:20000,c:"Makanan"},{n:"Ayam Bakar",p:35000,c:"Makanan"},{n:"Soto Betawi",p:30000,c:"Makanan"},{n:"Es Teh Manis",p:8000,c:"Minuman"},{n:"Kopi Susu",p:18000,c:"Minuman"},{n:"Jus Alpukat",p:15000,c:"Minuman"},{n:"Air Mineral",p:5000,c:"Minuman"},{n:"Kentang Goreng",p:15000,c:"Snack"},{n:"Risoles",p:10000,c:"Snack"},{n:"Tahu Crispy",p:12000,c:"Snack"},{n:"Cireng",p:8000,c:"Snack"},{n:"Es Krim",p:12000,c:"Dessert"},{n:"Pudding",p:10000,c:"Dessert"},{n:"Brownies",p:18000,c:"Dessert"},{n:"Cheesecake",p:25000,c:"Dessert"}];
let cart=[],cat="All",view="grid",dP=true,pay="",noteProd=null,shipCost=0,voucherDisc=0;
const fmt=n=>"Rp "+n.toLocaleString("id-ID");
const variants=['Regular','Large','Extra'];
const VOUCHERS={HEMAT10:{type:'pct',val:10,label:'HEMAT10 (-10%)'},DISKON5K:{type:'fix',val:5000,label:'DISKON5K (-Rp 5.000)'},GRATIS20:{type:'pct',val:20,label:'GRATIS20 (-20%)'}};

function applyVoucher(){
  const code=document.getElementById('voucherCode').value.trim().toUpperCase();
  const v=VOUCHERS[code];
  if(!v){alert('Voucher tidak valid');voucherDisc=0;document.getElementById('voucherInfo').classList.add('hidden');calcT();return;}
  document.getElementById('voucherInfo').classList.remove('hidden');
  document.getElementById('voucherLabel').textContent='✓ '+v.label;
  voucherDisc=v.type==='pct'?v.val:v.val;
  document.getElementById('voucherInfo').dataset.type=v.type;
  calcT();
}
const STORE_LAT=-7.8,STORE_LNG=110.4,PRICE_PER_KM=3000;
let map,marker,destMarker;

// Shipping
function setShip(cost){shipCost=+cost;document.getElementById('shipCost').textContent='';calcT();}
function openMap(){document.getElementById('mapModal').classList.remove('hidden');if(!map){setTimeout(()=>{initMap();getMyLocation();},100);}else{getMyLocation();}}
function closeMap(){document.getElementById('mapModal').classList.add('hidden');}
function initMap(){
  map=L.map('map').setView([STORE_LAT,STORE_LNG],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(map);
  marker=L.marker([STORE_LAT,STORE_LNG],{draggable:false}).addTo(map).bindPopup('Toko').openPopup();
  map.on('click',function(e){setDest(e.latlng.lat,e.latlng.lng);});
}
function setDest(lat,lng){
  if(destMarker)map.removeLayer(destMarker);
  destMarker=L.marker([lat,lng],{draggable:true}).addTo(map).bindPopup('Tujuan').openPopup();
  destMarker.on('dragend',function(e){const p=e.target.getLatLng();calcDist(p.lat,p.lng);});
  calcDist(lat,lng);
}
function calcDist(lat,lng){
  const R=6371,dLat=(lat-STORE_LAT)*Math.PI/180,dLng=(lng-STORE_LNG)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(STORE_LAT*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLng/2)**2;
  const dist=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  const km=Math.round(dist*10)/10;
  const cost=Math.round(km*PRICE_PER_KM);
  document.getElementById('mapDist').textContent=km;
  document.getElementById('mapCost').textContent=fmt(cost);
  shipCost=cost;
}
function getMyLocation(){
  if(!navigator.geolocation)return alert('Geolocation not supported');
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    map.setView([lat,lng],15);setDest(lat,lng);
  },()=>alert('Tidak bisa mendapatkan lokasi'));
}
function confirmMap(){document.getElementById('shipCost').textContent=fmt(shipCost);document.getElementById('shipDetail').classList.remove('hidden');closeMap();calcT();}


function openNote(name,e){e.stopPropagation();noteProd=name;const p=P.find(x=>x.n===name);document.getElementById('noteTitle').textContent=name;document.getElementById('noteInput').value='';document.getElementById('noteVariant').selectedIndex=0;document.getElementById('noteTotal').textContent=fmt(p.p);document.getElementById('noteModal').classList.remove('hidden');}
function closeNote(){document.getElementById('noteModal').classList.add('hidden');}
function updateNotePrice(){const p=P.find(x=>x.n===noteProd);const extra=+document.getElementById('noteVariant').value;document.getElementById('noteTotal').textContent=fmt(p.p+extra);}
function submitNote(){if(!noteProd)return;const p=P.find(x=>x.n===noteProd);const extra=+document.getElementById('noteVariant').value;const vLabel=variants[document.getElementById('noteVariant').selectedIndex];const note=document.getElementById('noteInput').value;const key=noteProd+'|'+vLabel+'|'+note;const e=cart.find(x=>x.key===key);if(e)e.q++;else cart.push({key,n:p.n,p:p.p+extra,q:1,variant:vLabel,note,extra});rCart();calcT();closeNote();}


function switchTab(t){
  document.getElementById('panelProd').className=t==='prod'?'flex-1 flex flex-col p-2 min-h-0':'hidden';
  document.getElementById('panelOrder').className=t==='order'?'flex flex-col h-full':'hidden lg:flex lg:w-72 xl:w-80 bg-base-100 border-t lg:border-t-0 lg:border-l border-base-300 flex-col h-full';
  document.getElementById('tabProd').className=t==='prod'?'flex-1 py-2 text-xs font-bold border-b-2 border-primary text-primary':'flex-1 py-2 text-xs font-medium text-base-content/60';
  document.getElementById('tabOrder').className=t==='order'?'flex-1 py-2 text-xs font-bold border-b-2 border-primary text-primary':'flex-1 py-2 text-xs font-medium text-base-content/60';
}
window.addEventListener('resize',()=>{
  const d=innerWidth>=1024;
  document.getElementById('panelProd').className='flex-1 flex flex-col p-2 min-h-0';
  document.getElementById('panelOrder').className=d?'lg:flex lg:w-72 xl:w-80 bg-base-100 border-l border-base-300 flex-col h-full':'hidden lg:flex lg:w-72 xl:w-80 bg-base-100 border-t lg:border-t-0 lg:border-l border-base-300 flex-col h-full';
  if(d){document.getElementById('tabProd').className='flex-1 py-2 text-xs font-bold border-b-2 border-primary text-primary';document.getElementById('tabOrder').className='flex-1 py-2 text-xs font-medium text-base-content/60';}
});

function render(){const c=document.getElementById("prods"),q=document.getElementById("src").value.toLowerCase(),f=P.filter(p=>(cat==="All"||p.c===cat)&&p.n.toLowerCase().includes(q));
if(view==="grid"){c.className="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-4 gap-1.5 content-start overflow-y-scroll min-h-0";c.innerHTML=f.map(p=>`<div class="pc card bg-base-100 border border-base-300 cursor-pointer" onclick="add('${p.n}')"><figure class="px-1 pt-1"><img src="https://placehold.co/100x70/f1f5f9/475569?text=${encodeURIComponent(p.n.split(' ')[0])}" class="rounded w-full h-14 object-cover"></figure><div class="p-1.5 pb-0"><p class="text-[11px] font-medium truncate">${p.n}</p><p class="text-[11px] font-bold">${fmt(p.p)}</p></div><div class="border-t border-base-200 mt-1.5 px-1.5 py-1"><button class="btn btn-xs btn-soft btn-block gap-0.5" onclick="openNote('${p.n}',event)"><span class="icon-[tabler--note] size-3"></span><span class="text-[9px]">Catatan</span></button></div></div>`).join("");}
else{c.className="space-y-1 overflow-y-scroll min-h-0";c.innerHTML=f.map(p=>`<div class="pc flex items-center gap-2 bg-base-100 border border-base-300 rounded p-1.5 cursor-pointer" onclick="add('${p.n}')"><div class="flex-1 min-w-0"><p class="text-xs font-medium truncate">${p.n}</p><span class="text-[10px] text-base-content/60">${p.c}</span></div><span class="text-xs font-bold shrink-0 mr-1">${fmt(p.p)}</span><button class="btn btn-xs btn-soft btn-circle shrink-0" onclick="openNote('${p.n}',event)" title="Catatan"><span class="icon-[tabler--note] size-3"></span></button></div>`).join("");}}

function add(n){const p=P.find(x=>x.n===n);const key=n+'|Regular|';const e=cart.find(x=>x.key===key);if(e)e.q++;else cart.push({key,n:p.n,p:p.p,q:1,variant:'Regular',note:'',extra:0});rCart();calcT();}
function uQ(key,d){const i=cart.find(x=>x.key===key);i.q+=d;if(i.q<=0)cart=cart.filter(x=>x.key!==key);rCart();calcT();}
function clearCart(){cart=[];rCart();calcT();}
function rCart(){const c=document.getElementById("cart");const cnt=cart.reduce((s,i)=>s+i.q,0);document.getElementById("cc").textContent=cnt?"("+cnt+")":"";document.getElementById("ccM").textContent=cnt||"";if(!cart.length){c.innerHTML='<p class="text-center text-base-content/40 text-xs py-4">Empty</p>';return;}c.innerHTML=cart.map(i=>{const hasInfo=i.variant!=='Regular'||i.note;return `<div class="py-1 border-b border-base-200 last:border-0"><div class="flex items-center gap-1"><div class="flex-1 min-w-0"><p class="text-xs font-medium truncate">${i.n}</p>${hasInfo?`<p class="text-[9px] text-base-content/50">${i.variant!=='Regular'?'<span class="badge badge-xs">'+i.variant+'</span> ':''}${i.note?'📝 '+i.note:''}</p>`:''}<p class="text-[10px] text-base-content/60">${fmt(i.p)}${i.extra?' <span class="text-primary">(+'+fmt(i.extra)+')</span>':''}</p></div><div class="join shrink-0"><button class="btn btn-xs join-item" onclick="uQ('${i.key}',-1)">−</button><span class="btn btn-xs join-item no-animation font-bold">${i.q}</span><button class="btn btn-xs join-item" onclick="uQ('${i.key}',1)">+</button></div><span class="text-xs font-bold w-14 text-right shrink-0">${fmt(i.p*i.q)}</span></div></div>`;}).join("");}
function calcT(){const st=cart.reduce((s,i)=>s+i.p*i.q,0);const dv=+(document.getElementById("dsc").value)||0;const tv=+(document.getElementById("tax").value)||0;const disc=dP?st*dv/100:dv;let af=Math.max(0,st-disc);
  // Voucher
  const vType=document.getElementById('voucherInfo').dataset.type;
  const vAmt=vType==='pct'?af*voucherDisc/100:voucherDisc;
  if(voucherDisc)document.getElementById('voucherAmt').textContent='-'+fmt(Math.round(vAmt));
  af=Math.max(0,af-vAmt);
  const g=Math.round(af+af*tv/100+shipCost);document.getElementById("sub").textContent=fmt(st);document.getElementById("tot").textContent=fmt(g);}
function checkout(){if(!cart.length)return alert("Empty!");if(!pay)return alert("Select payment!");alert("Success!");clearCart();}
function expPDF(){if(!cart.length)return alert("Empty!");const d=document.createElement('div');d.style.cssText='padding:16px;font:12px sans-serif';d.innerHTML='<h3>Struk - '+new Date().toLocaleString('id-ID')+'</h3><hr><br>'+cart.map(i=>`<div style="display:flex;justify-content:space-between"><span>${i.n} x${i.q}</span><span>${fmt(i.p*i.q)}</span></div>`).join('')+'<hr><div style="display:flex;justify-content:space-between;font-weight:bold;margin-top:8px"><span>Total</span><span>'+document.getElementById("tot").textContent+'</span></div>';html2pdf().set({margin:5,filename:'struk.pdf',jsPDF:{format:[80,200],unit:'mm'}}).from(d).save();}
document.querySelectorAll(".cat").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll(".cat").forEach(x=>{x.className="cat btn btn-xs btn-outline shrink-0"});b.className="cat btn btn-xs btn-primary shrink-0";cat=b.dataset.c;render();}));
document.querySelectorAll(".pay").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll(".pay").forEach(x=>{x.className="pay btn btn-xs btn-outline flex-1"});b.className="pay btn btn-xs btn-primary flex-1";pay=b.dataset.m;document.getElementById("qr").classList.toggle("hidden",pay!=="qris");}));
setInterval(()=>{document.getElementById("clk").textContent=new Date().toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"})},1000);
render();
</script>
<!-- Footer Nav (mobile only) -->
<footer class="lg:hidden fixed bottom-0 left-0 right-0 bg-base-100 border-t border-base-300 z-40">
